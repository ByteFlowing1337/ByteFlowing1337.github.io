<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ByteFlowing's Profile</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { 
      margin: 0; 
      padding: 0; 
      box-sizing: border-box; 
    }
    
    :root {
      --primary: #667eea;
      --secondary: #764ba2;
      --accent: #f093fb;
      --success: #4facfe;
      --warning: #43e97b;
      --glass-bg: rgba(255, 255, 255, 0.1);
      --glass-blur: blur(20px);
      --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      --bounce: all 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
    }
    
    body {
      font-family: 'Poppins', Arial, sans-serif;
      background: url('bg.png') no-repeat center center fixed;
      background-size: cover;
      min-height: 100vh;
      color: #ffffff;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      overflow: hidden;
    }
    
    /* 背景遮罩层，确保文字可读性 */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.3);
      z-index: -1;
    }
    
    /* 动态背景效果 */
    body::after {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: 
        radial-gradient(circle at 20% 80%, rgba(120, 119, 198, 0.2) 0%, transparent 50%),
        radial-gradient(circle at 80% 20%, rgba(255, 119, 198, 0.2) 0%, transparent 50%),
        radial-gradient(circle at 40% 40%, rgba(120, 219, 255, 0.2) 0%, transparent 50%);
      z-index: -1;
      animation: float 25s ease-in-out infinite;
      pointer-events: none;
    }
    
    @keyframes float {
      0%, 100% { 
        transform: translateY(0px) rotate(0deg) scale(1);
        opacity: 0.7;
      }
      25% { 
        transform: translateY(-15px) rotate(0.5deg) scale(1.02);
        opacity: 0.8;
      }
      50% { 
        transform: translateY(10px) rotate(-0.5deg) scale(0.98);
        opacity: 0.6;
      }
      75% { 
        transform: translateY(-5px) rotate(0.3deg) scale(1.01);
        opacity: 0.9;
      }
    }
    
    .info-container {
      text-align: center;
      background: none;
      padding: 0;
      position: relative;
      z-index: 2;
    }
    
    .avatar {
      width: 200px;
      height: 200px;
      border-radius: 50%;
      object-fit: cover;
      cursor: pointer;
      margin-bottom: 20px;
      border: 4px solid rgba(255, 255, 255, 0.2);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
      transition: var(--bounce);
      animation: avatarGlow 3s ease-in-out infinite alternate;
    }
    
    .avatar:hover {
      transform: scale(1.1) rotate(5deg);
      border-color: var(--accent);
      box-shadow: 0 30px 60px rgba(240, 147, 251, 0.4);
    }
    
    @keyframes avatarGlow {
      from { 
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2), 0 0 20px rgba(240, 147, 251, 0.3);
      }
      to { 
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2), 0 0 40px rgba(240, 147, 251, 0.6);
      }
    }
    
    .bar {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 90%;
      max-width: 500px;
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(25px);
      border-radius: 25px;
      padding: 30px;
      margin-top: 20px;
      border: 1px solid rgba(255, 255, 255, 0.3);
      box-shadow: 
        0 20px 40px rgba(0, 0, 0, 0.2),
        inset 0 1px 0 rgba(255, 255, 255, 0.2);
      animation: slideInUp 0.6s ease-out;
      transition: var(--transition);
    }
    
    .bar:hover {
      background: rgba(255, 255, 255, 0.25);
      transform: translateY(-8px);
      box-shadow: 
        0 30px 60px rgba(0, 0, 0, 0.3),
        inset 0 1px 0 rgba(255, 255, 255, 0.3);
      border-color: rgba(255, 255, 255, 0.4);
    }
    
    @keyframes slideInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    .bar p {
      font-size: 1.2rem;
      font-weight: 600;
      margin-bottom: 20px;
      background: linear-gradient(45deg, #fff, var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 1px;
    }
    
    .contact-wrap {
      display: flex;
      flex-direction: column;
      gap: 15px;
      width: 100%;
    }
    
         .contact-wrap a, 
     .contact-wrap p {
       display: flex;
       justify-content: center;
       align-items: center;
       padding: 16px 28px;
       color: #fff !important;
       text-decoration: none;
       font-size: 18px;
       font-weight: 500;
       background: rgba(255, 255, 255, 0.12);
       border-radius: 15px;
       border: 1px solid rgba(255, 255, 255, 0.25);
       transition: var(--bounce);
       backdrop-filter: blur(15px);
       box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
     }
    
    .contact-wrap a:hover {
      background: rgba(255, 255, 255, 0.25);
      transform: translateY(-4px) scale(1.03);
      box-shadow: 
        0 15px 35px rgba(0, 0, 0, 0.2),
        0 0 20px rgba(240, 147, 251, 0.2);
      border-color: rgba(255, 255, 255, 0.4);
    }
    
    .contact-wrap a i {
      margin-right: 12px;
      font-size: 20px;
      transition: var(--transition);
    }
    
    .contact-wrap a:hover i {
      transform: scale(1.2);
      color: var(--accent);
    }
    
      
    
               /* 特殊图标颜色 */
      .contact-wrap a[href*="github"] i {
        color: #333;
      }
      
      .contact-wrap a[href*="bilibili"] i {
        color: #00a1d6;
      }
      
      .contact-wrap a[href*="tencent"] i {
        color: #12B7F5;
      }
      
                    .contact-wrap a[href*="mailto"] i {
         color: #EA4335;
       }
       
       /* 悬浮时的颜色变化 */
       .contact-wrap a[href*="github"]:hover i {
         color: #000;
       }
       
       .contact-wrap a[href*="bilibili"]:hover i {
         color: #0091ea;
       }
       
               .contact-wrap a[href*="tencent"]:hover i {
          color: #0a9ee0;
        }
        
        .contact-wrap a[href*="mailto"]:hover i {
          color: #d32f2f;
        }
    
    /* 响应式设计 */
    @media(max-width: 768px) {
      .info-container {
        padding: 20px;
      }
      
      .avatar {
        width: 180px;
        height: 180px;
      }
      
      .bar {
        width: 95%;
        padding: 25px 20px;
      }
      
      .contact-wrap a, 
      .contact-wrap p {
        font-size: 16px;
        padding: 12px 18px;
      }
    }
    
    @media(max-width: 480px) {
      .avatar {
        width: 160px;
        height: 160px;
      }
      
      .bar {
        padding: 20px 15px;
      }
      
      .contact-wrap a, 
      .contact-wrap p {
        font-size: 15px;
        padding: 10px 14px;
      }
    }
    
    /* 滚动条美化 */
    ::-webkit-scrollbar {
      width: 8px;
    }
    
    ::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.1);
    }
    
    ::-webkit-scrollbar-thumb {
      background: linear-gradient(45deg, var(--accent), var(--success));
      border-radius: 4px;
    }
    
    ::-webkit-scrollbar-thumb:hover {
      background: linear-gradient(45deg, var(--success), var(--accent));
    }
  </style>
</head>
<body>
  <div class="info-container">
    <img class="avatar" id="avatar" src="avatar.jpg" alt="ByteFlowing's Avatar" />
    <div class="bar" id="bar">
      <p>Were their lifes wasted at the beginning?</p>
      <div class="contact-wrap">
        <a href="https://github.com/ByteFlowing1337" target="_blank">
          <i class="fab fa-github"></i> GitHub
        </a>
                 <a href="https://space.bilibili.com/1998380222" target="_blank">
           <i class="fab fa-bilibili"></i> Bilibili
         </a>
                   <a href="tencent://message/?uin=465669107" target="_blank">
            <i class="fab fa-qq"></i> QQ：465669107
          </a>
          <a href="mailto:fakeshadow1337@gmail.com" target="_blank">
            <i class="fas fa-envelope"></i> Email：fakeshadow1337@gmail.com
          </a>
      </div>
    </div>
  </div>

  <script>
    const avatar = document.getElementById('avatar');
    const bar = document.getElementById('bar');
    
    avatar.addEventListener('click', () => {
      if (bar.style.display === 'flex') {
        bar.style.display = 'none';
        avatar.style.transform = 'scale(1) rotate(0deg)';
      } else {
        bar.style.display = 'flex';
        avatar.style.transform = 'scale(1.05) rotate(2deg)';
      }
    });
    
    // 添加键盘快捷键支持
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && bar.style.display === 'flex') {
        bar.style.display = 'none';
        avatar.style.transform = 'scale(1) rotate(0deg)';
      }
    });
    
    // 添加点击外部区域关闭功能
    document.addEventListener('click', (e) => {
      if (!avatar.contains(e.target) && !bar.contains(e.target) && bar.style.display === 'flex') {
        bar.style.display = 'none';
        avatar.style.transform = 'scale(1) rotate(0deg)';
      }
    });
  </script>
</body>
</html>
